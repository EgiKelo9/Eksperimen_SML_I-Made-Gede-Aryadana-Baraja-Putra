name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Eksperimen_SML_I-Made-Gede-Aryadana-Baraja-Putra/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib

      - name: 4. Run Preprocessing Script
        working-directory: ./Eksperimen_SML_I-Made-Gede-Aryadana-Baraja-Putra/preprocessing
        run: |
          python automate_I-Made-Gede-Aryadana-Baraja-Putra.py

      - name: 5. Upload Processed Dataset & Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: preprocessing-results
          path: |
            Eksperimen_SML_I-Made-Gede-Aryadana-Baraja-Putra/preprocessing/pinhomedataset_preprocessing.csv
            Eksperimen_SML_I-Made-Gede-Aryadana-Baraja-Putra/preprocessing/artifacts/
          retention-days: 30